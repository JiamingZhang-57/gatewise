name: Build Sites artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OpenNext artifact
        run: pnpm build:sites

      - name: Bundle the production Worker
        run: pnpm wrangler deploy --dry-run --outdir dist

      - name: Prepare the Sites OpenNext bundle
        run: |
          mkdir -p .sites-build/.open-next .sites-build/.openai
          cp dist/worker.js .sites-build/.open-next/worker.js
          cp -R .open-next/assets .sites-build/.open-next/assets
          cp .openai/hosting.json .sites-build/.openai/hosting.json
          cp wrangler.jsonc .sites-build/wrangler.jsonc

      - name: Package Sites artifact
        run: tar -czf "$GITHUB_WORKSPACE/gatewise-sites.tar.gz" -C .sites-build .

      - name: Upload Sites artifact
        uses: actions/upload-artifact@v4
        with:
          name: gatewise-sites
          path: gatewise-sites.tar.gz
          if-no-files-found: error
          retention-days: 1
